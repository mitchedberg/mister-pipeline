name: Taito B Synthesis

on:
  push:
    paths:
      - 'chips/taito_b/**'
      - '.github/workflows/taito_b_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_b/**'
  workflow_dispatch:

jobs:
  quartus-b-synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Run Quartus synthesis
        run: |
          mkdir -p /tmp/quartus_diag
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/build" \
            raetro/quartus:17.0 \
            quartus_sh --flow compile chips/taito_b/quartus/taito_b 2>&1 | tee /tmp/quartus_diag/b_synthesis.log
          EXIT=${PIPESTATUS[0]}
          echo "Quartus exit code: $EXIT"
          exit $EXIT

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_b_synthesis_log
          path: /tmp/quartus_diag/b_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/b_artifacts
          cp chips/taito_b/quartus/output_files/taito_b.rbf /tmp/b_artifacts/
          cp chips/taito_b/mra/*.mra /tmp/b_artifacts/ 2>/dev/null || true
          ls -lh /tmp/b_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_b_rbf
          path: /tmp/b_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_b_synthesis_reports
          path: |
            chips/taito_b/quartus/output_files/*.rpt
            chips/taito_b/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_b/quartus/output_files/taito_b.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
