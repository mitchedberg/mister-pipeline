name: Taito B Synthesis

on:
  push:
    paths:
      - 'chips/taito_b/**'
      - '.github/workflows/taito_b_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_b/**'
  workflow_dispatch:

jobs:
  quartus-b-synthesis:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Run Quartus synthesis (Docker)
        run: |
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            raetro/quartus:17.0 \
            bash -c "cd /workspace/chips/taito_b/quartus && /opt/intelFPGA/quartus/bin/quartus_sh --flow compile taito_b 2>&1 | tee /workspace/taito_b_synthesis.log; exit \${PIPESTATUS[0]}"
          QEXIT=$?
          echo "Quartus exit code: $QEXIT"
          if [ $QEXIT -le 2 ]; then
            echo "Synthesis OK (0=clean 2=timing-only, both acceptable)"
            exit 0
          else
            echo "Synthesis FAILED (hard error)"
            exit 1
          fi

      - name: Synthesis report
        if: always()
        run: |
          echo "=== Resource usage ==="
          grep -E "Logic utilization|Total logic|M10K|MLAB|Fitter Status|Worst-case setup|Worst-case hold" taito_b_synthesis.log || true

      - name: Show synthesis log
        if: always()
        run: |
          echo "### Synthesis Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat taito_b_synthesis.log 2>/dev/null || echo "No log file generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat taito_b_synthesis.log 2>/dev/null || true
          # Fail the step if synthesis failed
          test -f taito_b_synthesis.log && grep -q "^Error\|^Error " taito_b_synthesis.log && exit 1 || exit 0

      - name: Fail if synthesis failed
        run: |
          grep -q "^Error\|^Error " taito_b_synthesis.log && exit 1 || exit 0

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_b_synthesis_log
          path: taito_b_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/b_artifacts
          cp chips/taito_b/quartus/output_files/taito_b.rbf /tmp/b_artifacts/
          cp chips/taito_b/mra/*.mra /tmp/b_artifacts/ 2>/dev/null || true
          ls -lh /tmp/b_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_b_rbf
          path: /tmp/b_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_b_synthesis_reports
          path: |
            chips/taito_b/quartus/output_files/*.rpt
            chips/taito_b/quartus/*.rpt
          retention-days: 14

      - name: Print synthesis errors
        if: failure()
        run: |
          echo "=== SYNTHESIS LOG (last 60 lines) ==="
          tail -60 taito_b_synthesis.log 2>/dev/null || echo "No log file found"
          echo "=== ERROR LINES ==="
          grep -i "error\|cannot\|missing\|not found\|failed" taito_b_synthesis.log 2>/dev/null | head -30 || true

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_b/quartus/output_files/taito_b.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "Logic utilization|Total registers|Total pins|Total block memory|Total RAM Blocks" "$RPT" || true
          fi
