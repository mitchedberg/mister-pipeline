name: NMK Arcade Synthesis

on:
  push:
    paths:
      - 'chips/nmk_arcade/**'
      - '.github/workflows/nmk_arcade_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/nmk_arcade/**'
  workflow_dispatch:

jobs:
  quartus-nmk-arcade-synthesis:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Run Quartus synthesis (Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            raetro/quartus:17.0 \
            sh -c "cd /workspace/chips/nmk_arcade/quartus && /opt/intelFPGA/quartus/bin/quartus_sh --flow compile nmk_arcade 2>&1 | tee /workspace/nmk_arcade_synthesis.log; QEXIT=\${PIPESTATUS[0]}; echo \"Quartus exit: \$QEXIT\"; [ \$QEXIT -le 2 ] && exit 0 || exit 1"

      - name: Synthesis report
        if: always()
        run: |
          echo "=== Resource usage ==="
          grep -E "Logic utilization|Total logic|M10K|MLAB|Fitter Status|Worst-case setup|Worst-case hold" nmk_arcade_synthesis.log || true

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nmk_arcade_synthesis_log
          path: nmk_arcade_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/nmk_artifacts
          cp chips/nmk_arcade/quartus/output_files/nmk_arcade.rbf /tmp/nmk_artifacts/
          cp chips/nmk_arcade/mra/*.mra /tmp/nmk_artifacts/ 2>/dev/null || true
          ls -lh /tmp/nmk_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nmk_arcade_rbf
          path: /tmp/nmk_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nmk_arcade_synthesis_reports
          path: |
            chips/nmk_arcade/quartus/output_files/*.rpt
            chips/nmk_arcade/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/nmk_arcade/quartus/output_files/nmk_arcade.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
