name: Taito Z Synthesis

on:
  push:
    paths:
      - 'chips/taito_z/**'
      - '.github/workflows/taito_z_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_z/**'
  workflow_dispatch:

jobs:
  quartus-z-synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Probe Quartus container
        run: |
          mkdir -p /tmp/quartus_diag
          docker run --rm raetro/quartus:17.0 sh -c "
            echo '=== ENV PATH ===' && echo \$PATH
            echo '=== which quartus_sh ===' && which quartus_sh || echo NOT_IN_PATH
            echo '=== quartus_sh version ===' && quartus_sh --version 2>&1 || echo NO_VERSION
            echo '=== find quartus_sh ===' && find / -name 'quartus_sh' 2>/dev/null | head -10 || true
            echo '=== /opt listing ===' && ls /opt 2>/dev/null || echo 'no /opt'
          " 2>&1 | tee /tmp/quartus_diag/probe.log
          echo "Probe exit: ${PIPESTATUS[0]}"

      - name: Run Quartus synthesis (via Docker)
        run: |
          mkdir -p /tmp/quartus_diag
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace/chips/taito_z/quartus \
            raetro/quartus:17.0 \
            sh -c "
              echo '==========================================
Starting Quartus Taito Z synthesis
=========================================='
              echo '=== PATH ===' && echo \$PATH
              echo '=== quartus_sh ===' && (which quartus_sh && quartus_sh --version) || echo quartus_sh NOT IN PATH
              for d in /opt/intelFPGA_lite/17.0/quartus/bin /opt/intelFPGA/17.0/quartus/bin /opt/altera/17.0/quartus/bin; do
                if [ -f \"\$d/quartus_sh\" ]; then
                  echo \"Found at \$d\" && export PATH=\"\$d:\$PATH\" && break
                fi
              done
              echo '=== Working dir ===' && ls -la
              quartus_sh --flow compile taito_z
              STATUS=\$?
              echo '=== Output files ===' && ls -la output_files/ 2>/dev/null || echo 'no output_files dir'
              exit \$STATUS
            " 2>&1 | tee /tmp/quartus_diag/z_synthesis.log
          EXIT=${PIPESTATUS[0]}
          echo "Docker exit code: $EXIT"
          exit $EXIT

      - name: Upload synthesis diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_synthesis_diag
          path: /tmp/quartus_diag/
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/z_artifacts
          cp chips/taito_z/quartus/output_files/taito_z.rbf /tmp/z_artifacts/
          cp chips/taito_z/mra/*.mra /tmp/z_artifacts/ 2>/dev/null || true
          ls -lh /tmp/z_artifacts/

      - name: Upload RBF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_rbf
          path: /tmp/z_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_synthesis_reports
          path: |
            chips/taito_z/quartus/output_files/*.rpt
            chips/taito_z/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_z/quartus/output_files/taito_z.fit.rpt
          if [ -f "$RPT" ]; then
            echo ""
            echo "Fitting Report Summary:"
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
