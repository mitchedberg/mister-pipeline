name: Taito Z Synthesis

on:
  push:
    paths:
      - 'chips/taito_z/**'
      - '.github/workflows/taito_z_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_z/**'
  workflow_dispatch:

jobs:
  quartus-z-synthesis:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Run Quartus synthesis (Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            raetro/quartus:17.0 \
            sh -c "cd /workspace/chips/taito_z/quartus && /opt/intelFPGA/quartus/bin/quartus_sh --flow compile taito_z 2>&1 | tee /workspace/taito_z_synthesis.log; exit \${PIPESTATUS[0]}"

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_synthesis_log
          path: taito_z_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/z_artifacts
          cp chips/taito_z/quartus/output_files/taito_z.rbf /tmp/z_artifacts/
          cp chips/taito_z/mra/*.mra /tmp/z_artifacts/ 2>/dev/null || true
          ls -lh /tmp/z_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_rbf
          path: /tmp/z_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_synthesis_reports
          path: |
            chips/taito_z/quartus/output_files/*.rpt
            chips/taito_z/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_z/quartus/output_files/taito_z.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "Logic utilization|Total registers|Total pins|Total block memory|Total RAM Blocks" "$RPT" || true
          fi
