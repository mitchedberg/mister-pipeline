name: Taito Z Synthesis

on:
  push:
    paths:
      - 'chips/taito_z/**'
      - '.github/workflows/taito_z_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_z/**'
  workflow_dispatch:

jobs:
  quartus-z-synthesis:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Cache Quartus
        uses: actions/cache@v4
        id: cache-quartus
        with:
          path: ~/intelFPGA_lite
          key: quartus-lite-17.0.2

      - name: Install Quartus Lite 17.0.2
        if: steps.cache-quartus.outputs.cache-hit != 'true'
        run: |
          # Quartus 17.0.2 is the standard for MiSTer/Cyclone V
          # Download from Intel/Altera archives
          wget -q "https://downloads.intel.com/akdlm/software/acdsinst/17.0std/602/ib_installers/QuartusLiteSetup-17.0.2.602-linux.run"
          chmod +x QuartusLiteSetup-17.0.2.602-linux.run
          # Install to home directory (no sudo required)
          ./QuartusLiteSetup-17.0.2.602-linux.run --mode unattended --accept_eula 1 --installdir ~/intelFPGA_lite

      - name: Run Quartus synthesis
        run: |
          export PATH="$HOME/intelFPGA_lite/quartus/bin:$PATH"
          cd "${{ github.workspace }}/chips/taito_z/quartus"
          mkdir -p /tmp/quartus_diag
          quartus_sh --flow compile taito_z 2>&1 | tee /tmp/quartus_diag/z_synthesis.log
          EXIT=${PIPESTATUS[0]}
          echo "Quartus exit code: $EXIT"
          exit $EXIT

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_synthesis_log
          path: /tmp/quartus_diag/z_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/z_artifacts
          cp chips/taito_z/quartus/output_files/taito_z.rbf /tmp/z_artifacts/
          cp chips/taito_z/mra/*.mra /tmp/z_artifacts/ 2>/dev/null || true
          ls -lh /tmp/z_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_rbf
          path: /tmp/z_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_z_synthesis_reports
          path: |
            chips/taito_z/quartus/output_files/*.rpt
            chips/taito_z/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_z/quartus/output_files/taito_z.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
