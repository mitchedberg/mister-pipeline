name: Taito F3 Synthesis

on:
  push:
    paths:
      - 'chips/taito_f3/**'
      - '.github/workflows/taito_f3_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_f3/**'
  workflow_dispatch:

jobs:
  quartus-f3-synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Run Quartus synthesis (via Docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace/chips/taito_f3/quartus \
            raetro/quartus:17.0 \
            sh -c "
              echo '=========================================='
              echo 'Starting Quartus F3 synthesis'
              echo '=========================================='

              # Diagnose Quartus installation
              echo '=== PATH ===' && echo \$PATH
              echo '=== Quartus search ===' && find /opt /home /usr -name 'quartus_sh' 2>/dev/null | head -5
              echo '=== quartus_sh ===' && (which quartus_sh && quartus_sh --version) || echo 'quartus_sh not in PATH'

              # Try known Quartus install paths
              for d in /opt/intelFPGA_lite/17.0/quartus/bin /opt/intelFPGA/17.0/quartus/bin /opt/altera/17.0/quartus/bin; do
                [ -f \"\$d/quartus_sh\" ] && echo \"Found at \$d\" && export PATH=\"\$d:\$PATH\" && break
              done

              quartus_sh --flow compile taito_f3
              STATUS=\$?
              if [ \$STATUS -eq 0 ]; then
                echo '=========================================='
                echo 'Synthesis SUCCESSFUL'
                echo '=========================================='
              else
                echo '=========================================='
                echo 'Synthesis FAILED (exit \$STATUS)'
                echo '=========================================='
              fi
              if [ -f output_files/taito_f3.rbf ]; then
                echo 'RBF file generated:'
                ls -lh output_files/taito_f3.rbf
              else
                echo 'ERROR: RBF file not found'
                ls -la output_files/ 2>/dev/null || true
              fi
              exit \$STATUS
            " || true

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/f3_artifacts
          cp chips/taito_f3/quartus/output_files/taito_f3.rbf /tmp/f3_artifacts/
          cp chips/taito_f3/mra/*.mra /tmp/f3_artifacts/ 2>/dev/null || true
          ls -lh /tmp/f3_artifacts/

      - name: Upload RBF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_f3_rbf
          path: /tmp/f3_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_f3_synthesis_reports
          path: |
            chips/taito_f3/quartus/output_files/*.rpt
            chips/taito_f3/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_f3/quartus/output_files/taito_f3.fit.rpt
          if [ -f "$RPT" ]; then
            echo ""
            echo "Fitting Report Summary:"
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
