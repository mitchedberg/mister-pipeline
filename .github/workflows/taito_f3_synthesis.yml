name: Taito F3 Synthesis

on:
  push:
    paths:
      - 'chips/taito_f3/**'
      - '.github/workflows/taito_f3_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/taito_f3/**'
  workflow_dispatch:

jobs:
  quartus-f3-synthesis:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Cache Quartus
        uses: actions/cache@v4
        id: cache-quartus
        with:
          path: ~/intelFPGA_lite
          key: quartus-lite-17.0.2

      - name: Install Quartus Lite 17.0.2
        if: steps.cache-quartus.outputs.cache-hit != 'true'
        run: |
          # Quartus 17.0.2 is the standard for MiSTer/Cyclone V
          # Download tar archive from Intel (8.7GB, ~30min on fast connection)
          echo "Downloading Quartus Lite 17.0.2 (8.7GB)..."
          wget --timeout=300 -q "https://downloads.intel.com/akdlm/software/acdsinst/17.0std.2/602/ib_tar/Quartus-lite-17.0.2.602-linux.tar"
          echo "Extracting to ~/intelFPGA_lite..."
          mkdir -p ~/intelFPGA_lite
          tar -xf Quartus-lite-17.0.2.602-linux.tar -C ~/intelFPGA_lite --strip-components=1

      - name: Run Quartus synthesis
        run: |
          export PATH="$HOME/intelFPGA_lite/quartus/bin:$PATH"
          cd "${{ github.workspace }}/chips/taito_f3/quartus"
          mkdir -p /tmp/quartus_diag
          quartus_sh --flow compile taito_f3 2>&1 | tee /tmp/quartus_diag/f3_synthesis.log
          EXIT=${PIPESTATUS[0]}
          echo "Quartus exit code: $EXIT"
          exit $EXIT

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_f3_synthesis_log
          path: /tmp/quartus_diag/f3_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/f3_artifacts
          cp chips/taito_f3/quartus/output_files/taito_f3.rbf /tmp/f3_artifacts/
          cp chips/taito_f3/mra/*.mra /tmp/f3_artifacts/ 2>/dev/null || true
          ls -lh /tmp/f3_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taito_f3_rbf
          path: /tmp/f3_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taito_f3_synthesis_reports
          path: |
            chips/taito_f3/quartus/output_files/*.rpt
            chips/taito_f3/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/taito_f3/quartus/output_files/taito_f3.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
