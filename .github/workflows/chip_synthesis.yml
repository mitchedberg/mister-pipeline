name: Chip Standalone Synthesis

# Per-chip synthesis jobs — fast validation (5–15 min each) before
# running the 30–90 min full system synthesis. Triggered when chip RTL changes.
# All chips pass check_rtl.sh before synthesis is attempted.

on:
  push:
    paths:
      - 'chips/**'
      - '.github/workflows/chip_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/**'
  workflow_dispatch:

# Helper macro: each job follows this pattern:
#   1. checkout
#   2. run check_rtl.sh on the chip's rtl/ dir
#   3. run Quartus standalone synthesis
#   4. report ALMs/M10K/timing from fit.rpt
#   5. upload log as artifact

jobs:

  # ---------------------------------------------------------------------------
  tc0630fdp:
    name: TC0630FDP (Taito F3 GPU)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Static check
        run: bash chips/check_rtl.sh tc0630fdp
      - name: Synthesize
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" raetro/quartus:17.0 \
            sh -c "cd /workspace/chips/tc0630fdp/standalone_synth && \
                   /opt/intelFPGA/quartus/bin/quartus_sh --flow compile standalone 2>&1 | \
                   tee /workspace/tc0630fdp_synth.log; exit \${PIPESTATUS[0]}"
      - name: Report resources
        if: always()
        run: |
          RPT=chips/tc0630fdp/standalone_synth/output_files/tc0630fdp_top.fit.rpt
          [ -f "$RPT" ] && grep -E "ALMs needed|Total block memory|Fmax" "$RPT" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tc0630fdp_synth_log
          path: |
            tc0630fdp_synth.log
            chips/tc0630fdp/standalone_synth/output_files/*.rpt
          retention-days: 7

