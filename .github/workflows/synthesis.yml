name: Quartus Synthesis Gates

on:
  push:
    paths:
      - 'chips/**/*.sv'
      - 'test_modules/**/*.sv'
  pull_request:
    paths:
      - 'chips/**/*.sv'
      - 'test_modules/**/*.sv'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run gates on all chip SVs (not just changed)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  quartus-synthesis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: false

      - name: Checkout jtcores audio module submodules
        run: |
          git submodule update --init vendor/jtcores
          cd vendor/jtcores && git submodule update --init modules/jt12 modules/jt51 modules/jt6295 modules/jtframe

      - name: Install Verilator + Yosys
        run: sudo apt-get update -qq && sudo apt-get install -y -qq verilator yosys

      - name: Determine SV files to process
        id: files
        run: |
          EVENT="${{ github.event_name }}"
          RUN_ALL="${{ github.event.inputs.run_all }}"

          if [ "$EVENT" = "workflow_dispatch" ] && [ "$RUN_ALL" = "true" ]; then
            FILES=$(find chips -name '*.sv' -path '*/rtl/*' | grep -v jtframe | tr '\n' ' ')
            FILES="$FILES $(find test_modules -name '*.sv' 2>/dev/null | tr '\n' ' ')"
          elif [ "$EVENT" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
            FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '\.sv$' | tr '\n' ' ')
          else
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              FILES=$(find chips -name '*.sv' -path '*/rtl/*' | grep -v jtframe | tr '\n' ' ')
            else
              FILES=$(git diff --name-only "$BEFORE" "$SHA" | grep '\.sv$' | tr '\n' ' ')
            fi
          fi

          FILES=$(echo "$FILES" | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Processing files: $FILES"

      - name: Gate 2.5 - Verilator strict lint
        run: |
          FILES="${{ steps.files.outputs.files }}"
          if [ -z "$FILES" ]; then echo "No SV files to lint."; exit 0; fi
          FAIL=0
          for f in $FILES; do
            echo "── Linting $f ──"
            if verilator --lint-only -Wall --language 1800-2012 --no-MODMISSING "$f" 2>&1; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Gate 3a - Yosys structural synthesis (best-effort)
        run: |
          FILES="${{ steps.files.outputs.files }}"
          if [ -z "$FILES" ]; then echo "No SV files for Yosys."; exit 0; fi
          for f in $FILES; do
            echo "── Yosys: $f ──"
            if yosys -p "read_verilog -sv $f; synth; check" 2>&1; then
              echo "  PASS: $f"
            else
              echo "  SKIP: $f (Yosys SV2012 limitation — non-fatal, Verilator covers lint)"
            fi
          done

      - name: Gate 3b - Quartus map (Cyclone V, best-effort)
        run: |
          FILES="${{ steps.files.outputs.files }}"
          if [ -z "$FILES" ]; then echo "No SV files for Quartus."; exit 0; fi
          WORK=/tmp/quartus_work
          mkdir -p "$WORK"
          for f in $FILES; do
            MODULE=$(basename "$f" .sv)
            MDIR="$WORK/$MODULE"
            mkdir -p "$MDIR"
            printf 'set_global_assignment -name FAMILY "Cyclone V"\n' > "$MDIR/${MODULE}.qsf"
            printf 'set_global_assignment -name DEVICE 5CSEBA6U23I7\n' >> "$MDIR/${MODULE}.qsf"
            printf 'set_global_assignment -name TOP_LEVEL_ENTITY %s\n' "${MODULE}" >> "$MDIR/${MODULE}.qsf"
            printf 'set_global_assignment -name SYSTEMVERILOG_FILE /workspace/%s\n' "${f}" >> "$MDIR/${MODULE}.qsf"
            echo "── Quartus map: $MODULE ──"
            # Best-effort via Docker — standalone files may have missing dependencies
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/workspace" \
              -v "$MDIR:/work" \
              -w /work \
              raetro/quartus:17.0 \
              sh -c "quartus_map ${MODULE} --read_settings_files=on 2>&1" \
              || echo "  SKIP: $MODULE (missing dependencies OK for standalone lint)"
          done

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-reports
          path: /tmp/quartus_work/**/*.rpt
