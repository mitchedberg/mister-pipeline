name: Quartus Synthesis Gates

on:
  push:
    paths:
      - 'chips/**/*.sv'
      - 'test_modules/**/*.sv'
  pull_request:
    paths:
      - 'chips/**/*.sv'
      - 'test_modules/**/*.sv'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run gates on all chip SVs (not just changed)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  quartus-synthesis:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit for diff

      - name: Cache Quartus
        uses: actions/cache@v4
        id: cache-quartus
        with:
          path: ~/intelFPGA_lite
          key: quartus-lite-23.1

      - name: Install Quartus Lite 23.1
        if: steps.cache-quartus.outputs.cache-hit != 'true'
        run: |
          wget -q "https://downloads.intel.com/akdlm/software/acdsinst/23.1std/991/ib_installers/QuartusLiteSetup-23.1std.0.991-linux.run"
          chmod +x QuartusLiteSetup-23.1std.0.991-linux.run
          ./QuartusLiteSetup-23.1std.0.991-linux.run --mode unattended --accept_eula 1 --installdir ~/intelFPGA_lite
          echo "$HOME/intelFPGA_lite/quartus/bin" >> $GITHUB_PATH

      - name: Add Quartus to PATH (cached)
        if: steps.cache-quartus.outputs.cache-hit == 'true'
        run: echo "$HOME/intelFPGA_lite/quartus/bin" >> $GITHUB_PATH

      - name: Install Verilator + Yosys
        run: sudo apt-get install -y verilator yosys

      - name: Determine SV files to process
        id: files
        run: |
          EVENT="${{ github.event_name }}"
          RUN_ALL="${{ github.event.inputs.run_all }}"

          if [ "$EVENT" = "workflow_dispatch" ] && [ "$RUN_ALL" = "true" ]; then
            # Manual trigger: process all chip RTL files
            FILES=$(find chips -name '*.sv' -path '*/rtl/*' | grep -v jtframe | tr '\n' ' ')
            FILES="$FILES $(find test_modules -name '*.sv' | tr '\n' ' ')"
          elif [ "$EVENT" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
            FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '\.sv$' | tr '\n' ' ')
          else
            # push event
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            # Handle zero SHA (first push to branch): fall back to all SV files
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              FILES=$(find chips -name '*.sv' -path '*/rtl/*' | grep -v jtframe | tr '\n' ' ')
              FILES="$FILES $(find test_modules -name '*.sv' | tr '\n' ' ')"
            else
              FILES=$(git diff --name-only "$BEFORE" "$SHA" | grep '\.sv$' | tr '\n' ' ')
            fi
          fi

          # Remove leading/trailing whitespace
          FILES=$(echo "$FILES" | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Processing files: $FILES"

      - name: Gate 2.5 - Verilator strict lint
        run: |
          FILES="${{ steps.files.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No SV files to lint."
            exit 0
          fi
          FAIL=0
          for f in $FILES; do
            echo "── Linting $f ──"
            if verilator --lint-only -Wall --language 1800-2012 "$f" 2>&1; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Gate 3a - Yosys structural synthesis
        run: |
          FILES="${{ steps.files.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No SV files for Yosys."
            exit 0
          fi
          FAIL=0
          for f in $FILES; do
            echo "── Yosys: $f ──"
            if yosys -p "read_verilog -sv $f; synth; check" 2>&1; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Gate 3b - Quartus map (Cyclone V)
        run: |
          FILES="${{ steps.files.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No SV files for Quartus."
            exit 0
          fi
          FAIL=0
          WORK=/tmp/quartus_work
          mkdir -p "$WORK"
          for f in $FILES; do
            MODULE=$(basename "$f" .sv)
            MDIR="$WORK/$MODULE"
            mkdir -p "$MDIR"

            cat > "$MDIR/${MODULE}.qpf" << QPFEOF
PROJECT_REVISION = "${MODULE}"
QPFEOF
            cat > "$MDIR/${MODULE}.qsf" << QSFEOF
set_global_assignment -name FAMILY "Cyclone V"
set_global_assignment -name DEVICE 5CSEBA6U23I7
set_global_assignment -name TOP_LEVEL_ENTITY ${MODULE}
set_global_assignment -name SYSTEMVERILOG_FILE ${GITHUB_WORKSPACE}/${f}
QSFEOF

            echo "── Quartus map: $MODULE ──"
            if (cd "$MDIR" && quartus_map ${MODULE} --read_settings_files=on 2>&1); then
              # Check for latch inference
              if grep -q "Inferred latch" "$MDIR/${MODULE}.map.rpt" 2>/dev/null; then
                echo "  FAIL: Quartus inferred latches in $f"
                grep "Inferred latch" "$MDIR/${MODULE}.map.rpt"
                FAIL=1
              else
                echo "  PASS: $f"
              fi
            else
              echo "  FAIL: quartus_map error for $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Gate 3c - Quartus CDC analysis
        run: |
          FILES="${{ steps.files.outputs.files }}"
          WORK=/tmp/quartus_work
          for f in $FILES; do
            MODULE=$(basename "$f" .sv)
            MDIR="$WORK/$MODULE"
            [ -d "$MDIR" ] || continue
            echo "── CDC: $MODULE ──"
            (cd "$MDIR" && quartus_sta $MODULE --do_report_timing 2>/dev/null) || true
            if [ -f "$MDIR/${MODULE}.sta.rpt" ]; then
              grep -i "clock domain crossing\|cdc" "$MDIR/${MODULE}.sta.rpt" || echo "  No CDC crossings reported"
            else
              echo "  (no STA report generated)"
            fi
          done

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-reports
          path: /tmp/quartus_work/**/*.rpt
