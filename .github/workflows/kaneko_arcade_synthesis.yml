name: Kaneko Arcade Synthesis

on:
  push:
    paths:
      - 'chips/kaneko_arcade/**'
      - '.github/workflows/kaneko_arcade_synthesis.yml'
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'chips/kaneko_arcade/**'
  workflow_dispatch:

jobs:
  quartus-kaneko-synthesis:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Run Quartus synthesis (Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            raetro/quartus:17.0 \
            sh -c "cd /workspace/chips/kaneko_arcade/quartus && /opt/intelFPGA/quartus/bin/quartus_sh --flow compile kaneko_arcade 2>&1 | tee /workspace/kaneko_arcade_synthesis.log; exit \${PIPESTATUS[0]}"

      - name: Upload synthesis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaneko_arcade_synthesis_log
          path: kaneko_arcade_synthesis.log
          retention-days: 7

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p /tmp/kaneko_artifacts
          cp chips/kaneko_arcade/quartus/output_files/kaneko_arcade.rbf /tmp/kaneko_artifacts/
          cp chips/kaneko_arcade/mra/*.mra /tmp/kaneko_artifacts/ 2>/dev/null || true
          ls -lh /tmp/kaneko_artifacts/

      - name: Upload RBF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kaneko_arcade_rbf
          path: /tmp/kaneko_artifacts/
          retention-days: 30
          compression-level: 0

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaneko_arcade_synthesis_reports
          path: |
            chips/kaneko_arcade/quartus/output_files/*.rpt
            chips/kaneko_arcade/quartus/*.rpt
          retention-days: 14

      - name: Report status
        if: always()
        run: |
          echo "Job Status: ${{ job.status }}"
          RPT=chips/kaneko_arcade/quartus/output_files/kaneko_arcade.fit.rpt
          if [ -f "$RPT" ]; then
            grep -E "^Total logic elements|Total memory bits|Total pins|I/O pins used" "$RPT" || true
          fi
